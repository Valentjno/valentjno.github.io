<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Style Verification Test</title>
</head>
<body>
    <h1>Typography Test</h1>
    <p>This paragraph should be left-aligned with no transform effects on hover.</p>
    <h2>Section Heading</h2>
    <p>Hover over this text - it should only change opacity, not move or glow.</p>
    
    <h3>Smaller Heading</h3>
    <p>Last paragraph in a section.</p>
    
    <script>
        // Test that CSS variables are defined
        const style = getComputedStyle(document.documentElement);
        const bgLight = style.getPropertyValue('--bg-light').trim();
        const colorBlack = style.getPropertyValue('--color-black').trim();
        console.log('CSS Variables check:');
        console.log('--bg-light:', bgLight || 'NOT DEFINED');
        console.log('--color-black:', colorBlack || 'NOT DEFINED');
        
        // Check that computed styles are correct
        const p = document.querySelector('p');
        const pStyle = getComputedStyle(p);
        console.log('Paragraph text-align:', pStyle.textAlign);
        console.log('Paragraph line-height:', pStyle.lineHeight);
    </script>
</body>
</html>
